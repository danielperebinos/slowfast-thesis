name: Lint

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Ruff (check + format)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Cache uv's download + venv based on uv.lock.
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Set up Python 3.10
        # Respect .python-version; uv will install the exact interpreter if missing.
        run: uv python install 3.10

      - name: Install dev dependencies (ruff)
        # --only-group dev + --no-install-project installs ONLY ruff.
        # Keeps torch / pytorchvideo / the project build out of the CI image.
        run: uv sync --only-group dev --no-install-project

      - name: Ruff — lint
        run: uv run ruff check experiments

      - name: Ruff — format check
        run: uv run ruff format --check experiments
